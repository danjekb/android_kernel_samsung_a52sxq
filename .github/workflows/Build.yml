name: Build Kernel via Script

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses-dev \
            git curl wget zip unzip build-essential

      # =========================
      # TOOLCHAIN (r530567)
      # =========================
      - name: Setup Clang (r530567)
        run: |
          mkdir -p toolchain/clang-r530567
          echo "Pobieranie Clang r530567..."
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O clang.tar.gz
          
          echo "Rozpakowywanie..."
          tar -xzf clang.tar.gz -C toolchain/clang-r530567
          rm clang.tar.gz

          echo "Sprawdzanie wersji Clang:"
          ./toolchain/clang-r530567/bin/clang --version

      # =========================
      # RUN BUILD SCRIPT
      # =========================
      - name: Execute Build Script
        run: |
          # Nadajemy uprawnienia do wykonania skryptu
          chmod +x ./build_kernel.sh

          # Przygotowanie katalogów wymaganych przez skrypt
          export EXPORT_DIR="$PWD/out_artifacts"
          export ANYKERNEL_DIR="$PWD/AnyKernel3"
          mkdir -p $EXPORT_DIR
          mkdir -p $ANYKERNEL_DIR

          # Dynamiczna podmiana twardo wpisanych ścieżek toolchaina w skrypcie na nowy Clang r530567
          sed -i "s|export BUILD_CROSS_COMPILE=.*|export BUILD_CROSS_COMPILE=$PWD/toolchain/clang-r530567/bin/aarch64-linux-gnu-|g" ./build_kernel.sh
          sed -i "s|export KERNEL_LLVM_BIN=.*|export KERNEL_LLVM_BIN=$PWD/toolchain/clang-r530567/bin/clang|g" ./build_kernel.sh
          sed -i "s|export CLANG_TRIPLE=.*|export CLANG_TRIPLE=aarch64-linux-gnu-|g" ./build_kernel.sh

          # Odpalenie skryptu kompilacji
          ./build_kernel.sh

          # Przeniesienie wygenerowanej paczki zip do głównego katalogu pod Release
          mv $EXPORT_DIR/*.zip ./kernel-a52sxq.zip || true

      # =========================
      # RELEASE OUTPUT
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "SlopKernel Build #${{ github.run_number }}"
          draft: true
          prerelease: false
          files: kernel-a52sxq.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
