name: Build Kernel via Script

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses-dev \
            git curl wget zip unzip build-essential

      # =========================
      # TOOLCHAINS (Clang + GCC)
      # =========================
      - name: Setup Clang & GCC (AOSP Official)
        run: |
          # 1. Pobieranie Clang r530567
          mkdir -p toolchain/clang-r530567
          echo "Pobieranie Clang r530567..."
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/clang-r530567
          rm clang.tar.gz

          # 2. Pobieranie GCC aarch64 (wymagane jako CROSS_COMPILE przez skrypt/kernel)
          mkdir -p toolchain/gcc-aarch64
          echo "Pobieranie GCC aarch64..."
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/main.tar.gz -O gcc.tar.gz
          tar -xzf gcc.tar.gz -C toolchain/gcc-aarch64
          rm gcc.tar.gz

          echo "Sprawdzanie wersji Clang:"
          ./toolchain/clang-r530567/bin/clang --version

      # =========================
      # RUN BUILD SCRIPT
      # =========================
      - name: Execute Build Script
        run: |
          chmod +x ./build_kernel.sh

          # Przygotowanie katalogów wymaganych przez skrypt
          export EXPORT_DIR="$PWD/out_artifacts"
          export ANYKERNEL_DIR="$PWD/AnyKernel3"
          mkdir -p $EXPORT_DIR
          mkdir -p $ANYKERNEL_DIR

          # Nadpisujemy zmienne środowiskowe, które skrypt i tak wyeksportuje,
          # ale tym razem kierujemy je na nowo pobrane, poprawne toolchainy.
          # Wstrzykujemy je do środowiska wykonywania:
          export BUILD_CROSS_COMPILE="$PWD/toolchain/gcc-aarch64/bin/aarch64-linux-android-"
          export KERNEL_LLVM_BIN="$PWD/toolchain/clang-r530567/bin/clang"
          export CLANG_TRIPLE="aarch64-linux-gnu-"

          # Zamiast niebezpiecznego sed, modyfikujemy skrypt tak, aby honorował nasze zmienne (jeśli są ustawione)
          # Usuwamy twardo wpisane ścieżki toolchainów ze skryptu w locie:
          sed -i '/export BUILD_CROSS_COMPILE=/d' ./build_kernel.sh
          sed -i '/export KERNEL_LLVM_BIN=/d' ./build_kernel.sh
          sed -i '/export CLANG_TRIPLE=/d' ./build_kernel.sh

          # Odpalenie skryptu kompilacji ze zdefiniowanym środowiskiem
          ./build_kernel.sh

          # Przeniesienie wygenerowanej paczki zip do głównego katalogu pod Release
          mv $EXPORT_DIR/*.zip ./kernel-a52sxq.zip || true

      # =========================
      # RELEASE OUTPUT
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "SlopKernel Build #${{ github.run_number }}"
          draft: true
          prerelease: false
          files: kernel-a52sxq.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
