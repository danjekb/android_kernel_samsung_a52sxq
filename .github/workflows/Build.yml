name: Build A52s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: danjekb/android_kernel_samsung_a52sxq

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl zip unzip build-essential bc bison flex libssl-dev libelf-dev python3 gcc-aarch64-linux-gnu lld llvm cpio

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang
          key: clang-17.0.6-ubuntu22.04

      - name: Download and Setup Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/clang
          cd ${{ github.workspace }}/clang
          curl -LO https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          tar -xf clang*.tar.xz --strip-components=1
          rm clang*.tar.xz

      - name: Set Environment Variables
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "LC_ALL=C" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=Jarek" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=GitHub-Actions" >> $GITHUB_ENV
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH

      - name: Clean Build Tree
        run: |
          make O=out mrproper

      - name: Configure Defconfig
        run: |
          make O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            REAL_CC=clang \
            DTC_EXT=${{ github.workspace }}/tools/dtc \
            CONFIG_BUILD_ARM64_DT_OVERLAY=y \
            WERROR=0 \
            CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y \
            CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y \
            CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y \
            CONFIG_SECTION_MISMATCH_WARN_ONLY=y \
            vendor/a52sxq_eur_open_defconfig

      - name: Compile Kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            REAL_CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LLVM=1 LLVM_IAS=1 \
            DTC_EXT=${{ github.workspace }}/tools/dtc \
            CONFIG_BUILD_ARM64_DT_OVERLAY=y \
            WERROR=0 \
            CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y \
            CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y \
            CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y \
            CONFIG_SECTION_MISMATCH_WARN_ONLY=y \
            LOCALVERSION="-Wonderful-0.1-exp-vanilla"

      - name: Package Output Artifacts
        run: |
          mkdir -p outpkg
          [ -f out/arch/arm64/boot/Image ] && cp out/arch/arm64/boot/Image outpkg/
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img outpkg/
          
          cd outpkg
          zip -r kernel.zip .

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WonderfulKernel-a52sxq
          path: outpkg/kernel.zip
