name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses-dev \
            git curl wget zip unzip build-essential

      # ==========================================
      # TOOLCHAIN: GOOGLE AOSP CLANG (r530567)
      # ==========================================
      - name: Setup Clang (AOSP official)
        run: |
          mkdir -p toolchain
          # Pobieranie zalecanej wersji Clanga ze sprawdzonych repozytoriów Google AOSP
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 toolchain/clang-r530567

          echo "Clang version:"
          toolchain/clang-r530567/bin/clang --version

      # ==========================================
      # BUILD ENVIRONMENT
      # ==========================================
      - name: Export build env
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_COMPILER_STRING="Clang AOSP (LLVM)"

          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "SUBARCH=$SUBARCH" >> $GITHUB_ENV

      # ==========================================
      # EXECUTE BUILD SCRIPT (LLVM MODE)
      # ==========================================
      - name: Execute Build Script
        run: |
          chmod +x ./build_kernel.sh

          # Przygotowanie katalogów wymaganych przez skrypt
          export EXPORT_DIR="$PWD/out_artifacts"
          export ANYKERNEL_DIR="$PWD/AnyKernel3"
          mkdir -p $EXPORT_DIR
          mkdir -p $ANYKERNEL_DIR

          # Dodajemy binaria pobranego Clanga do PATH, aby mechanizm LLVM=1 go odnalazł
          export PATH="$PWD/toolchain/clang-r530567/bin:$PATH"
          export CLANG_TRIPLE="aarch64-linux-gnu-"

          # Uruchomienie skryptu kompilacji ze zdefiniowanym środowiskiem LLVM
          ./build_kernel.sh

          # Przeniesienie wygenerowanej paczki zip do głównego katalogu pod Release
          mv $EXPORT_DIR/*.zip ./kernel-a52sxq.zip || true

      # ==========================================
      # PUBLISH TO GITHUB RELEASES
      # ==========================================
      - name: Upload Kernel to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "WonderfulKernel-${{ github.run_number }}"
          name: "Wonderful Kernel v0.1-exp (Build ${{ github.run_number }})"
          draft: false
          prerelease: false
          files: |
            kernel-a52sxq.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
