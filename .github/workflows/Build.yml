name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses-dev \
            git curl wget zip unzip build-essential \
            libxml2

      # ==========================================
      # TOOLCHAIN: PROTOClang / AOSP LLVM COMPILER
      # ==========================================
      - name: Setup Clang (AOSP LLVM Release)
        run: |
          mkdir -p toolchain/clang
          # Pobieranie stabilnej, kompletnej paczki binarnej skompilowanego Clanga dla Linux x86_64
          wget https://github.com/ZyCromerZ/Clang/releases/download/19.0.0-20240311-release/Clang-19.0.0-20240311.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C toolchain/clang
          rm clang.tar.gz

          echo "Clang version:"
          ./toolchain/clang/bin/clang --version

      # ==========================================
      # BUILD ENVIRONMENT
      # ==========================================
      - name: Export build env
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV

      # ==========================================
      # EXECUTE BUILD SCRIPT (LLVM MODE)
      # ==========================================
      - name: Execute Build Script
        run: |
          chmod +x ./build_kernel.sh

          # Przygotowanie katalogów wymaganych przez skrypt
          export EXPORT_DIR="$PWD/out_artifacts"
          export ANYKERNEL_DIR="$PWD/AnyKernel3"
          mkdir -p $EXPORT_DIR
          mkdir -p $ANYKERNEL_DIR

          # Dodajemy binaria pobranego Clanga do ścieżki PATH
          export PATH="$PWD/toolchain/clang/bin:$PATH"
          export CLANG_TRIPLE="aarch64-linux-gnu-"

          # Uruchomienie skryptu kompilacji ze zdefiniowanym środowiskiem LLVM
          ./build_kernel.sh

          # Przeniesienie wygenerowanej paczki zip do głównego katalogu pod Release
          mv $EXPORT_DIR/*.zip ./kernel-a52sxq.zip || true

      # ==========================================
      # PUBLISH TO GITHUB RELEASES
      # ==========================================
      - name: Upload Kernel to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "WonderfulKernel-${{ github.run_number }}"
          name: "Wonderful Kernel v0.1-exp (Build ${{ github.run_number }})"
          draft: false
          prerelease: false
          files: |
            kernel-a52sxq.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
