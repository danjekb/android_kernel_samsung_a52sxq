name: Budowanie SlopKernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Maksymalizacja przestrzeni dyskowej
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 5120
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Sprawdzenie kodu repozytorium
      uses: actions/checkout@v4

    - name: Instalacja wymaganych pakietów systemowych
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev wget unzip

    - name: Przygotowanie struktur i Toolchainów pod skrypt build_kernel.sh
      run: |
        echo "Pobieranie i ustawianie kompatybilnych toolchainów..."
        
        # Tworzenie struktury folderów zgodnej ze skryptem
        mkdir -p toolchain/google
        mkdir -p toolchain/clang-12.0.7
        
        # Pobieranie prebuilts GCC (AARCH64) z działającego tagu Androida 12 z flagą --no-tags
        echo "Klonowanie stabilnego GCC AArch64..."
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android-12.1.0_r27 --depth=1 --no-tags toolchain/google/
        
        # Pobieranie kompatybilnego Clanga od Google pod zdefiniowaną ścieżkę
        echo "Pobieranie Clang 12.0.7..."
        cd toolchain/clang-12.0.7
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-12.1.0_r27/clang-r416183b.tar.gz
        tar -xf clang-r416183b.tar.gz
        rm -f clang-r416183b.tar.gz
        cd ../..
        
        # Klonowanie AnyKernel3 jeśli nie ma go w repo
        if [ ! -d "AnyKernel3" ]; then
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
        fi

    - name: Odpalenie kompilacji przez skrypt build_kernel.sh
      run: |
        chmod +x build_kernel.sh
        
        # Definiujemy zmienne katalogów wyjściowych
        export EXPORT_DIR="$(pwd)/out_final"
        export ANYKERNEL_DIR="$(pwd)/AnyKernel3"
        
        # Uruchomienie oryginalnego procesu kompilacji
        ./build_kernel.sh

    - name: Wrzuć gotowy Kernel do zakładki Releases
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: SlopKernel Wonderful-Slop-v1
        draft: false
        prerelease: false
        files: |
          AnyKernel3/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
