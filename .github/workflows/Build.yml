name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses-dev \
            git curl wget zip unzip build-essential

      # =========================
      # TOOLCHAIN (FIXED)
      # =========================
      - name: Setup Clang (AOSP official)
        run: |
          mkdir -p toolchain
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 toolchain/clang

          echo "Clang version:"
          toolchain/clang/bin/clang --version

      # =========================
      # BUILD ENV
      # =========================
      - name: Export build env
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_COMPILER_STRING="Clang AOSP"

          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "SUBARCH=$SUBARCH" >> $GITHUB_ENV

      # =========================
      # BUILD KERNEL
      # =========================
      - name: Build kernel
        run: |
          export PATH=$PWD/toolchain/clang/bin:$PATH

          make O=out ARCH=arm64 a52sxq_eur_open_defconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      # =========================
      # PACKAGE ARTIFACTS
      # =========================
      - name: Prepare AnyKernel3
        run: |
          mkdir -p AnyKernel3
          cp out/arch/arm64/boot/Image* AnyKernel3/ || true
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/ || true

          cd AnyKernel3
          zip -r9 kernel.zip .

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-a52s
          path: AnyKernel3/kernel.zip
